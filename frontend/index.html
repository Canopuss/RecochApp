<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background"></div>

    <main class="login-container">
        <header>
            <h1>RecochApp</h1>
            <p>La red de los cracks del barrio</p>
        </header>

        <form id="login-form">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Entrar a la Cancha</button>

            <div id="error-msg"></div>
        </form>

        <div class="footer-links">
            <p>¿No tienes cuenta? <a href="register.html">Regístrate aquí</a></p>
            <p style="margin-top: 10px;"><a href="forgot-password.html" style="color: var(--text-dim);">¿Olvidaste tu contraseña?</a></p>
        </div>
    </main>

    <script src="js/auth.js"></script>
</body>
</html>
