<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Recuperar Contraseña</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background"></div>
    <main class="login-container">
        <a href="index.html" class="back-btn">Regresar al Login</a>
        <header>
            <h1>Recuperar Acceso</h1>
            <p>Ingresa tu correo para recibir un enlace de recuperación.</p>
        </header>
        <form id="forgot-form">
            <div class="form-group"><label for="recovery-email">Correo Electrónico</label><input type="email" id="recovery-email" placeholder="tu@email.com" required></div>
            <button type="submit" class="login-btn">Enviar Enlace</button>
            <div id="status-msg" style="text-align: center; margin-top: 15px; font-size: 0.9rem;"></div>
        </form>
    </main>
    <script src="js/forgot-password.js"></script>
</body>
</html>
