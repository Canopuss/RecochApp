<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Gestión de Recochas</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background"></div>
    <div class="section-container">
        <a href="dashboard.html" class="back-btn">Volver a Panel de crack</a>
        <header>
            <h1><i class="fas fa-futbol"></i> Gestión de Recochas</h1>
            <p>Organiza partidos rápidos y convoca a tus amigos.</p>
        </header>

        <div style="text-align: center; padding: 40px; border: 2px dashed var(--glass-border); border-radius: 15px;">
            <i class="fas fa-calendar-plus" style="font-size: 3rem; color: var(--primary-green); margin-bottom: 20px; display: block;"></i>
            <h3>No tienes partidos programados</h3>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Empieza creando tu primer partido para hoy.</p>
            <button class="login-btn" style="width: auto; padding: 12px 30px;">Crear Nuevo Partido</button>
        </div>
    </div>
</body>
</html>
