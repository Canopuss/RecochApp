<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Registro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { max-width: 500px; }
    </style>
</head>
<body>
    <div class="background"></div>

    <main class="login-container">
        <header>
            <h1>Únete a la Cancha</h1>
            <p>Crea tu perfil y empieza a sumar estadísticas</p>
        </header>

        <form id="register-form">
            <div class="form-group">
                <label for="fullname">Nombre Completo</label>
                <input type="text" id="fullname" placeholder="Ej. Lucho Díaz" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="age">Edad</label>
                    <input type="number" id="age" min="5" max="99" placeholder="25" required>
                </div>
                <div class="form-group" style="display: flex; flex-direction: column;">
                    <label for="gender">Sexo</label>
                    <select id="gender" required style="width: 100%; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-size: 1rem; appearance: none; cursor: pointer;">
                        <option value="" disabled selected>Selecciona</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="login-btn">Registrarme</button>
            
            <div id="error-msg"></div>
        </form>

        <div class="footer-links">
            <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
        </div>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
