<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Mis Clubes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background"></div>
    <div class="section-container">
        <a href="dashboard.html" class="back-btn">Volver a Panel de crack</a>
        <header>
            <h1><i class="fas fa-users"></i> Mis Clubes</h1>
            <p>Gestiona tus equipos de amigos o únete a nuevos grupos.</p>
        </header>

        <div style="text-align: center; padding: 40px; border: 2px dashed var(--glass-border); border-radius: 15px;">
            <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--primary-green); margin-bottom: 20px; display: block;"></i>
            <h3>Aún no perteneces a un club</h3>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Los clubes te permiten organizar partidos recurrentes.</p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="login-btn" style="width: auto; padding: 12px 30px;">Crear Club</button>
                <button class="login-btn" style="width: auto; padding: 12px 30px; background: transparent; border: 1px solid var(--primary-green); color: var(--primary-green);">Unirse a Club</button>
            </div>
        </div>
    </div>
</body>
</html>
