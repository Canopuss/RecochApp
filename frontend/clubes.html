<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecochApp - Mis Clubes</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background"></div>
    <div class="section-container">
        <a href="dashboard.html" class="back-btn">Volver a Panel de crack</a>
        <header>
            <h1><i class="fas fa-users"></i> Mis Clubes</h1>
            <p>Gestiona tus equipos de amigos o únete a nuevos grupos.</p>
        </header>

        <div id="clubs-list-container" style="display: none; text-align: left; margin-bottom: 20px;">
            <h3 style="margin-bottom: 15px; color: var(--primary-green); border-bottom: 1px solid var(--glass-border); padding-bottom: 10px;">Tus Clubes Activos</h3>
            <div id="clubs-list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;"></div>
        </div>

        <div id="empty-state" style="text-align: center; padding: 40px; border: 2px dashed var(--glass-border); border-radius: 15px;">
            <i class="fas fa-shield-halved" style="font-size: 3rem; color: var(--primary-green); margin-bottom: 20px; display: block;"></i>
            <h3>Aún no perteneces a un club</h3>
            <p style="color: var(--text-dim); margin-bottom: 25px;">Los clubes te permiten organizar partidos recurrentes.</p>
        </div>

        <div style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
            <button id="show-create-club-btn" class="login-btn" style="width: auto; padding: 12px 30px;">Crear Club</button>
            <button id="show-join-club-btn" class="login-btn" style="width: auto; padding: 12px 30px; background: transparent; border: 1px solid var(--primary-green); color: var(--primary-green);">Unirse a Club</button>
        </div>
        
        <!-- Form Create Club -->
        <div id="create-club-form" style="display: none; margin-top: 30px; text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;">
            <h3 style="margin-bottom: 15px; color: var(--primary-green);">Crear Nuevo Club</h3>
            <form id="new-club-form">
                <div class="form-group">
                    <label for="club-name">Nombre del Club</label>
                    <input type="text" id="club-name" placeholder="Ej: Los Galácticos" required>
                </div>
                <div class="form-group">
                    <label for="club-logo-upload" class="upload-label" style="display:inline-block; font-size:0.9rem; padding:8px 15px; margin-top:0; margin-bottom:10px;"><i class="fas fa-image"></i> Subir Escudo (Opcional)</label>
                    <input type="file" id="club-logo-upload" accept="image/*" style="display: none;">
                    <div id="logo-preview-container" style="display:none; text-align:center; margin-bottom:15px;">
                        <img id="logo-preview" src="" alt="Escudo Preliminar" style="max-height: 80px; border-radius: 10px;">
                    </div>
                </div>
                <div class="form-group">
                    <label for="club-members">Añadir Miembros (Correos separados por coma)</label>
                    <textarea id="club-members" placeholder="correo1@ejemplo.com, correo2@ejemplo.com" style="width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 10px; color: #fff; font-family: inherit; resize: vertical; min-height: 80px;"></textarea>
                </div>
                <button type="submit" class="login-btn">Fundar Club</button>
                <button type="button" id="cancel-create-club" class="login-btn" style="background: rgba(255,255,255,0.1); color: var(--text-white); margin-top: 10px;">Cancelar</button>
            </form>
        </div>

        <!-- Form Join Club -->
        <div id="join-club-form" style="display: none; margin-top: 30px; text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px;">
            <h3 style="margin-bottom: 15px; color: var(--primary-green);">Unirse a un Club</h3>
            <form id="search-club-form">
                <div class="form-group">
                    <label for="search-club-name">Nombre Exacto del Club</label>
                    <input type="text" id="search-club-name" placeholder="Ej: Los Galácticos" required>
                </div>
                <button type="submit" class="login-btn">Fichar (Enviar Solicitud)</button>
                <button type="button" id="cancel-join-club" class="login-btn" style="background: rgba(255,255,255,0.1); color: var(--text-white); margin-top: 10px;">Cancelar</button>
            </form>
        </div>
    </div>

    <script src="js/clubes.js"></script>
</body>
</html>
